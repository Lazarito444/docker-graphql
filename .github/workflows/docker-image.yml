name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Docker login
      env:
        DOCKER_USER: ${{ secrets.DOCKER_USER }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      run: |
        docker login -u $DOCKER_USER -p $DOCKER_PASSWORD

    - name: Build Docker Image
      run: | 
        docker image build -t lazarito444/docker-graphql:0.0.2 .
        docker image build -t lazarito444/docker-graphql:latest
    
    - name: Push Docker Image
      run: | 
        docker image push lazarito444/docker-graphql:0.0.2
        docker image push lazarito444/docker-graphql:latest
